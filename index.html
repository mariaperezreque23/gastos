<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gastos">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="Gestión de gastos personal">
<title>Gastos</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Mis Gastos&quot;,&quot;short_name&quot;:&quot;Gastos&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230a0a0a&quot;,&quot;theme_color&quot;:&quot;%230a0a0a&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0a'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E💰%3C/text%3E%3C/svg%3E&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0a'/><text y='.9em' font-size='80' x='10'>💰</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --accent: #c8f566;
  --accent-dim: rgba(200,245,102,0.12);
  --red: #ff6b6b;
  --red-dim: rgba(255,107,107,0.12);
  --amber: #ffb347;
  --amber-dim: rgba(255,179,71,0.12);
  --safe: 0px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.12);
    --text: #111;
    --text2: #666;
    --text3: #aaa;
    --accent: #2d7a00;
    --accent-dim: rgba(45,122,0,0.1);
    --red: #c0392b;
    --red-dim: rgba(192,57,43,0.1);
    --amber: #b5620a;
    --amber-dim: rgba(181,98,10,0.1);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: 'DM Sans', sans-serif; color: var(--text); display: flex; flex-direction: column; }

/* LAYOUT */
#app { flex: 1; display: flex; flex-direction: column; overflow: hidden; max-width: 480px; width: 100%; margin: 0 auto; }
#screen { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
#screen::-webkit-scrollbar { display: none; }

/* TOP BAR */
.topbar { padding: 52px 20px 16px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
.topbar-row { display: flex; align-items: baseline; justify-content: space-between; }
.topbar h1 { font-size: 13px; font-weight: 400; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
.topbar .month { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* HERO */
.hero { padding: 8px 20px 24px; }
.hero-label { font-size: 12px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.hero-amount { font-size: 48px; font-weight: 300; color: var(--text); letter-spacing: -1px; font-family: 'DM Mono', monospace; line-height: 1; }
.hero-amount span { font-size: 24px; color: var(--text2); }
.hero-sub { display: flex; gap: 16px; margin-top: 12px; }
.hero-chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; }
.chip-good { background: var(--accent-dim); color: var(--accent); }
.chip-bad { background: var(--red-dim); color: var(--red); }
.chip-warn { background: var(--amber-dim); color: var(--amber); }

/* PROGRESS */
.prog-wrap { margin: 0 20px 20px; }
.prog-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
.prog-label { display: flex; justify-content: space-between; margin-top: 6px; }
.prog-label span { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

/* SECTION */
.section-title { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 20px; margin-bottom: 10px; }

/* CATEGORIES */
.cats { padding: 0 20px 24px; display: flex; flex-direction: column; gap: 2px; }
.cat-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-info { flex: 1; min-width: 0; }
.cat-name { font-size: 14px; color: var(--text); }
.cat-bar { height: 2px; background: var(--surface2); border-radius: 1px; margin-top: 4px; overflow: hidden; }
.cat-bar-fill { height: 100%; border-radius: 1px; }
.cat-nums { text-align: right; flex-shrink: 0; }
.cat-spent { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); font-weight: 400; }
.cat-budget { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 1px; }

/* RECENT */
.recents { padding: 0 20px 100px; display: flex; flex-direction: column; gap: 2px; }
.gasto-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.gasto-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.gasto-info { flex: 1; min-width: 0; }
.gasto-desc { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gasto-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.gasto-amount { font-size: 14px; font-family: 'DM Mono', monospace; color: var(--text); flex-shrink: 0; }
.gasto-del { background: none; border: none; color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; line-height: 1; }
.empty-state { padding: 40px 0; text-align: center; color: var(--text3); font-size: 13px; }

/* BOTTOM NAV */
.nav { display: flex; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 0px); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0; cursor: pointer; background: none; border: none; color: var(--text3); transition: color 0.15s; }
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 20px; height: 20px; }
.nav-btn span { font-size: 10px; letter-spacing: 0.04em; }

/* ADD SCREEN */
.add-screen { padding: 20px; }
.field { margin-bottom: 16px; }
.field label { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.field input, .field select { width: 100%; padding: 13px 14px; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); font-size: 16px; font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none; }
.field input:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text3); }
.cat-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.cat-pick-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; font-size: 20px; color: var(--text2); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.cat-pick-btn span { font-size: 10px; color: var(--text3); }
.cat-pick-btn.selected { border-color: var(--accent); background: var(--accent-dim); }
.btn-add { width: 100%; padding: 16px; background: var(--accent); color: #0a0a0a; font-size: 15px; font-weight: 500; border: none; border-radius: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; letter-spacing: 0.01em; }
@media (prefers-color-scheme: light) { .btn-add { color: #fff; background: #2d7a00; } }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* BUDGET SCREEN */
.budget-screen { padding: 20px 20px 100px; }
.budget-row { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 2px; }
.budget-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.budget-name { font-size: 14px; color: var(--text); flex: 1; }
.budget-input { width: 90px; padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace; text-align: right; outline: none; }
.budget-input:focus { border-color: var(--accent); }
.btn-save { width: calc(100% - 40px); margin: 16px 20px 0; padding: 14px; background: var(--surface2); color: var(--text); font-size: 14px; border: 1px solid var(--border2); border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; letter-spacing: 0.02em; }

/* CHART SCREEN */
.chart-screen { padding: 20px 20px 100px; }
.chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.chart-title { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; }
.chart-canvas { position: relative; width: 100%; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

/* AI SCREEN */
.ai-screen { padding: 20px 20px 100px; }
.ai-btn { width: 100%; padding: 14px; background: var(--accent-dim); color: var(--accent); font-size: 14px; border: 1px solid var(--accent); border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-bottom: 16px; letter-spacing: 0.02em; }
.ai-result { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; font-size: 14px; line-height: 1.7; color: var(--text2); white-space: pre-wrap; min-height: 120px; }
.ai-loading { color: var(--text3); font-style: italic; }

/* TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); font-size: 13px; padding: 8px 16px; border-radius: 20px; opacity: 0; transition: all 0.2s; pointer-events: none; white-space: nowrap; z-index: 100; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.cat-row, .gasto-item, .budget-row { animation: fadeUp 0.2s ease both; }
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showTab('home')" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Inicio</span>
    </button>
    <button class="nav-btn" onclick="showTab('add')" id="nav-add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Añadir</span>
    </button>
    <button class="nav-btn" onclick="showTab('budget')" id="nav-budget">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>Presupuesto</span>
    </button>
    <button class="nav-btn" onclick="showTab('charts')" id="nav-charts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Gráficos</span>
    </button>
    <button class="nav-btn" onclick="showTab('ai')" id="nav-ai">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      <span>IA</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CATS = [
  {id:'alimentacion', name:'Alimentación', icon:'🛒', color:'#4ade80'},
  {id:'transporte',   name:'Transporte',   icon:'🚗', color:'#60a5fa'},
  {id:'vivienda',     name:'Vivienda',     icon:'🏠', color:'#a78bfa'},
  {id:'ocio',         name:'Ocio',         icon:'🎬', color:'#f97316'},
  {id:'salud',        name:'Salud',        icon:'💊', color:'#34d399'},
  {id:'ropa',         name:'Ropa',         icon:'👕', color:'#f472b6'},
  {id:'suscripciones',name:'Suscripciones',icon:'📱', color:'#fb923c'},
  {id:'otros',        name:'Otros',        icon:'📦', color:'#94a3b8'},
];

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let currentTab = 'home';
let selectedCat = 'alimentacion';
let barChart = null, donutChart = null;

function loadState() {
  try { return JSON.parse(localStorage.getItem('gastos-pwa') || 'null'); } catch { return null; }
}
function saveState() {
  localStorage.setItem('gastos-pwa', JSON.stringify(state));
}

let state = loadState() || {
  gastos: [],
  budgets: { alimentacion:400, transporte:150, vivienda:800, ocio:150, salud:80, ropa:100, suscripciones:50, otros:100 }
};

function now() { return new Date().toISOString().slice(0,7); }
function fmt(n) { return (n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function fmtShort(n) { return (n||0).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+' €'; }

function getSpent(month) {
  const m = month || now();
  const s = {};
  CATS.forEach(c => s[c.id] = 0);
  state.gastos.filter(g => g.fecha.startsWith(m)).forEach(g => s[g.cat] = (s[g.cat]||0) + g.importe);
  return s;
}

function totalBudget() { return Object.values(state.budgets).reduce((a,b)=>a+b,0); }
function totalSpent(month) { return Object.values(getSpent(month)).reduce((a,b)=>a+b,0); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  renderScreen();
}

function renderScreen() {
  const s = document.getElementById('screen');
  if (currentTab === 'home') s.innerHTML = renderHome();
  else if (currentTab === 'add') s.innerHTML = renderAdd();
  else if (currentTab === 'budget') s.innerHTML = renderBudget();
  else if (currentTab === 'charts') { s.innerHTML = renderCharts(); drawCharts(); }
  else if (currentTab === 'ai') s.innerHTML = renderAI();
}

function renderHome() {
  const spent = getSpent();
  const totalB = totalBudget();
  const totalS = totalSpent();
  const left = totalB - totalS;
  const pct = totalB > 0 ? Math.min(100, (totalS/totalB*100)) : 0;
  const progColor = pct > 90 ? 'var(--red)' : pct > 70 ? 'var(--amber)' : 'var(--accent)';
  const leftChip = left < 0 ? `chip-bad` : pct > 80 ? `chip-warn` : `chip-good`;

  const d = new Date();
  const monthLabel = MONTHS[d.getMonth()] + ' ' + d.getFullYear();

  const catRows = CATS.map((c,i) => {
    const s = spent[c.id] || 0;
    const b = state.budgets[c.id] || 0;
    if (s === 0 && b === 0) return '';
    const p = b > 0 ? Math.min(100, s/b*100) : 0;
    const col = p > 90 ? 'var(--red)' : p > 70 ? 'var(--amber)' : c.color;
    return `<div class="cat-row" style="animation-delay:${i*0.03}s">
      <div class="cat-dot" style="background:${c.color}"></div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <div class="cat-bar"><div class="cat-bar-fill" style="width:${p.toFixed(1)}%;background:${col}"></div></div>
      </div>
      <div class="cat-nums">
        <div class="cat-spent">${fmtShort(s)}</div>
        <div class="cat-budget">/ ${fmtShort(b)}</div>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  const recents = [...state.gastos].filter(g => g.fecha.startsWith(now())).sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,8);
  const recentHtml = recents.length === 0 ? '<div class="empty-state">Sin gastos este mes</div>' :
    recents.map((g,i) => {
      const cat = CATS.find(c=>c.id===g.cat)||CATS[7];
      const idx = state.gastos.indexOf(g);
      return `<div class="gasto-item" style="animation-delay:${i*0.03}s">
        <div class="gasto-icon" style="background:${cat.color}22">${cat.icon}</div>
        <div class="gasto-info">
          <div class="gasto-desc">${g.desc}</div>
          <div class="gasto-meta">${cat.name} · ${g.fecha.slice(5).replace('-','/')}</div>
        </div>
        <div class="gasto-amount">${fmt(g.importe)}</div>
        <button class="gasto-del" onclick="deleteGasto(${idx})">×</button>
      </div>`;
    }).join('');

  const [euros, cents] = totalS.toFixed(2).split('.');

  return `
    <div class="topbar">
      <div class="topbar-row">
        <h1>Mis Gastos</h1>
        <span class="month">${monthLabel}</span>
      </div>
    </div>
    <div class="hero">
      <div class="hero-label">Gastado este mes</div>
      <div class="hero-amount">${euros.replace(/\B(?=(\d{3})+(?!\d))/g,',')}<span>,${cents} €</span></div>
      <div class="hero-sub">
        <div class="hero-chip ${leftChip}">${left >= 0 ? '+' : ''}${fmtShort(left)} disponible</div>
        <div class="hero-chip chip-warn">${Math.round(pct)}% usado</div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" style="width:${pct.toFixed(1)}%;background:${progColor}"></div></div>
      <div class="prog-label">
        <span>0 €</span>
        <span>${fmtShort(totalB)}</span>
      </div>
    </div>
    <div class="section-title">Por categoría</div>
    <div class="cats">${catRows || '<div class="empty-state">Configura tu presupuesto</div>'}</div>
    <div class="section-title">Últimos gastos</div>
    <div class="recents">${recentHtml}</div>`;
}

function renderAdd() {
  const today = new Date().toISOString().split('T')[0];
  const catBtns = CATS.map(c => `
    <button class="cat-pick-btn ${selectedCat===c.id?'selected':''}" onclick="selectCat('${c.id}')">
      ${c.icon}<span>${c.name.slice(0,6)}</span>
    </button>`).join('');
  return `
    <div class="topbar"><div class="topbar-row"><h1>Añadir gasto</h1></div></div>
    <div class="add-screen">
      <div class="field">
        <label>Descripción</label>
        <input type="text" id="g-desc" placeholder="Ej: Mercadona, Netflix..." autocomplete="off">
      </div>
      <div class="two-col">
        <div class="field">
          <label>Importe (€)</label>
          <input type="number" id="g-importe" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
        </div>
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="g-fecha" value="${today}">
        </div>
      </div>
      <div class="field">
        <label>Categoría</label>
        <div class="cat-picker">${catBtns}</div>
      </div>
      <button class="btn-add" onclick="addGasto()">Añadir gasto</button>
    </div>`;
}

function renderBudget() {
  const rows = CATS.map((c,i) => `
    <div class="budget-row" style="animation-delay:${i*0.03}s">
      <div class="budget-dot" style="background:${c.color}"></div>
      <div class="budget-name">${c.icon} ${c.name}</div>
      <input class="budget-input" type="number" id="b-${c.id}" value="${state.budgets[c.id]||0}" min="0" step="10" inputmode="numeric">
    </div>`).join('');
  return `
    <div class="topbar"><div class="topbar-row"><h1>Presupuesto</h1><span class="month">mensual</span></div></div>
    <div class="budget-screen">${rows}</div>
    <button class="btn-save" onclick="saveBudgets()">Guardar cambios</button>`;
}

function renderCharts() {
  const legend = CATS.map(c=>`<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div>${c.name}</div>`).join('');
  return `
    <div class="topbar"><div class="topbar-row"><h1>Análisis</h1></div></div>
    <div class="chart-screen">
      <div class="chart-wrap">
        <div class="chart-title">Gasto vs presupuesto</div>
        <div class="chart-canvas" style="height:220px"><canvas id="bar-chart" role="img" aria-label="Gasto vs presupuesto por categoría"></canvas></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Distribución del gasto</div>
        <div class="chart-canvas" style="height:200px"><canvas id="donut-chart" role="img" aria-label="Distribución del gasto por categoría"></canvas></div>
        <div class="legend">${legend}</div>
      </div>
    </div>`;
}

function renderAI() {
  return `
    <div class="topbar"><div class="topbar-row"><h1>Asesor IA</h1></div></div>
    <div class="ai-screen">
      <button class="ai-btn" onclick="runAI()">✦ Analizar mis finanzas</button>
      <div class="ai-result ai-loading" id="ai-box">Pulsa el botón para recibir un análisis personalizado de tus finanzas con consejos concretos.</div>
    </div>`;
}

function drawCharts() {
  requestAnimationFrame(() => {
    const spent = getSpent();
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    const labelColor = isDark ? '#666' : '#aaa';

    const bc = document.getElementById('bar-chart');
    if (bc) {
      if (barChart) barChart.destroy();
      barChart = new Chart(bc, {
        type: 'bar',
        data: {
          labels: CATS.map(c => c.name.slice(0,5)),
          datasets: [
            { label: 'Gastado', data: CATS.map(c => spent[c.id]||0), backgroundColor: CATS.map(c => c.color+'bb'), borderRadius: 6, borderSkipped: false },
            { label: 'Presupuesto', data: CATS.map(c => state.budgets[c.id]||0), backgroundColor: 'transparent', borderColor: CATS.map(c => c.color+'55'), borderWidth: 1, borderRadius: 6, borderSkipped: false }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.raw) } } },
          scales: {
            x: { grid: { color: gridColor }, ticks: { color: labelColor, font: { size: 10 }, autoSkip: false, maxRotation: 30 } },
            y: { grid: { color: gridColor }, ticks: { color: labelColor, font: { size: 10 }, callback: v => v + '€' } }
          }
        }
      });
    }

    const dc = document.getElementById('donut-chart');
    if (dc) {
      if (donutChart) donutChart.destroy();
      const data = CATS.map(c => spent[c.id]||0);
      const total = data.reduce((a,b)=>a+b,0);
      if (total === 0) { dc.parentElement.innerHTML = '<div class="empty-state">Sin gastos este mes</div>'; return; }
      donutChart = new Chart(dc, {
        type: 'doughnut',
        data: { labels: CATS.map(c=>c.name), datasets: [{ data, backgroundColor: CATS.map(c=>c.color+'cc'), borderWidth: 0, hoverOffset: 4 }] },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '68%',
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + fmt(ctx.raw) + ' (' + Math.round(ctx.raw/total*100) + '%)' } } }
        }
      });
    }
  });
}

function selectCat(id) {
  selectedCat = id;
  renderScreen();
  requestAnimationFrame(() => {
    document.getElementById('g-desc')?.focus();
  });
}

function addGasto() {
  const desc = document.getElementById('g-desc')?.value.trim();
  const importe = parseFloat(document.getElementById('g-importe')?.value);
  const fecha = document.getElementById('g-fecha')?.value;
  if (!desc || !importe || importe <= 0 || !fecha) { toast('Completa todos los campos'); return; }
  state.gastos.push({ desc, importe, cat: selectedCat, fecha });
  saveState();
  toast('Gasto añadido ✓');
  showTab('home');
}

function deleteGasto(idx) {
  if (confirm('¿Eliminar este gasto?')) {
    state.gastos.splice(idx, 1);
    saveState();
    renderScreen();
  }
}

function saveBudgets() {
  CATS.forEach(c => {
    const v = parseFloat(document.getElementById('b-'+c.id)?.value) || 0;
    state.budgets[c.id] = v;
  });
  saveState();
  toast('Presupuesto guardado ✓');
}

async function runAI() {
  const box = document.getElementById('ai-box');
  box.className = 'ai-result ai-loading';
  box.textContent = 'Analizando tus finanzas…';

  const spent = getSpent();
  const totalB = totalBudget();
  const totalS = totalSpent();
  const lines = CATS.map(c => `- ${c.name}: ${(spent[c.id]||0).toFixed(2)}€ gastado de ${state.budgets[c.id]||0}€`).join('\n');
  const recientes = [...state.gastos].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,15).map(g=>`${g.fecha}: ${g.desc} ${g.importe}€ (${g.cat})`).join('\n');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Eres un asesor financiero personal. Analiza estos datos y da consejos concretos en español, en texto plano sin asteriscos ni markdown.

Mes actual — Presupuesto: ${totalB.toFixed(2)}€ | Gastado: ${totalS.toFixed(2)}€ | Restante: ${(totalB-totalS).toFixed(2)}€

Por categoría:\n${lines}

Últimos gastos:\n${recientes||'Sin gastos registrados.'}

Estructura tu respuesta en 3 partes breves:
1. Diagnóstico (2-3 frases con números)
2. Qué mejorar (2-3 puntos específicos)
3. Consejo para hacer crecer mi patrimonio (1-2 frases prácticas)`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text || 'No se pudo obtener el análisis.';
    box.className = 'ai-result';
    box.textContent = text;
  } catch {
    box.className = 'ai-result';
    box.textContent = 'Error al conectar. Comprueba tu conexión e inténtalo de nuevo.';
  }
}

// Service Worker para PWA offline
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'gastos-v1';
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(['.']))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('.')))));
  `;
  const blob = new Blob([sw], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

renderScreen();
</script>
</body>
</html>
